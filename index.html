<title>まいにちドリル スタンプ帳 v33 layout test</title>
<!-- v33 layout test: calendar-left main layout, compact header, day delete UI, one-row log buttons -->
<style>
:root{--pink:#ff8fc7;--hot:#ff5fae;--pale:#fff0f7;--line:#ffd3e8;--text:#5a405f;--soft:#947b9c;--mint:#9ee7dc;--cream:#fff3bf}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;padding:6px 12px 72px;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;color:var(--text);background:radial-gradient(circle at 12% 9%,#fff3bf 0 8%,transparent 9%),radial-gradient(circle at 90% 14%,#bff0e8 0 9%,transparent 10%),radial-gradient(circle at 12% 88%,#d8caff 0 9%,transparent 10%),linear-gradient(#fff7fb,#fffdf0);min-height:100vh}
.app{max-width:920px;margin:auto}
.hero{display:grid;grid-template-columns:150px 1fr;gap:12px;align-items:center;background:rgba(255,255,255,.86);border:3px solid var(--line);border-radius:32px;padding:7px 14px;box-shadow:0 14px 34px #ff8fc733;margin-bottom:8px}
.heroCat{width:138px;height:138px;border-radius:50%;display:grid;place-items:center;background:var(--cream);border:4px solid #fff;overflow:hidden}
.heroCat img{width:205%;height:205%;object-fit:contain;transform:translateY(-24px)}
h1{margin:0;color:var(--hot);font-size:clamp(24px,4vw,36px);line-height:1.08;white-space:nowrap}
.sub{margin-top:6px;color:var(--soft);font-weight:900}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:9px}
.stat{background:#fffffff0;border:3px solid #ffe0ef;border-radius:22px;padding:5px 6px;text-align:center;box-shadow:0 8px 20px #ff8fc724}
.stat .n{font-size:clamp(22px,3.8vw,32px);font-weight:950;color:var(--hot);line-height:1}
.stat .l{font-size:12px;font-weight:950;color:var(--soft)}
.reward{background:linear-gradient(135deg,#fff5c7,#ffe4f1);border:3px solid var(--line);border-radius:22px;padding:7px;text-align:center;font-weight:950;margin-bottom:14px;box-shadow:0 8px 20px #ffd3e83d}
.screen{display:none}.screen.active{display:block}
.card{background:#fffffff0;border:3px solid var(--line);border-radius:26px;padding:12px 20px;box-shadow:0 14px 34px #ff8fc733;margin-bottom:14px}
h2{margin:0 0 7px;color:var(--hot);font-size:21px}
label{display:block;margin:7px 0 4px;font-weight:950}
input,select,textarea{width:100%;border:3px solid var(--line);border-radius:18px;background:white;color:var(--text);padding:8px 14px;font-size:18px;font-weight:750;outline:none}
textarea{min-height:52px;resize:vertical}input[type="date"]{display:block;width:100%;min-width:0;-webkit-appearance:none;appearance:none;text-align:center;}
input:focus,select:focus,textarea:focus{border-color:var(--pink);box-shadow:0 0 0 5px #ff8fc72e}
.dekita{display:block;width:min(240px,46%);margin:4px auto 0;border:0;background:transparent;padding:0;filter:drop-shadow(0 8px 12px #ff5fae30);cursor:pointer;line-height:0}
.dekita img{width:100%;display:block;}
.dekita:active{transform:translateY(4px) scale(.99)}
.help{color:var(--soft);font-weight:700;font-size:12px;line-height:1.35}
.cheer-message{margin:5px 0 0;padding:7px 14px;border-radius:24px;border:3px solid #ffd3e8;background:linear-gradient(135deg,#fff7cb,#fff0f7);color:#6a496b;font-weight:950;line-height:1.35;text-align:center;box-shadow:0 8px 20px #ffd3e83d}
.log-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.file-input-hidden{display:none}
.record-row{grid-template-columns:1fr}

.calHead{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:6px}
.month{font-size:22px;font-weight:950;color:var(--hot)}
.btn{border:0;border-radius:16px;padding:8px 11px;background:var(--mint);font-weight:950;color:#3f6265;cursor:pointer}
.btn.gray{background:#f2edf6;color:var(--soft)}
.btn.pink{background:#ffd8ea;color:#8a4670}
.btn.red{background:#ffd6df;color:#9a465b}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.dow{text-align:center;color:var(--soft);font-weight:950;font-size:12px;padding:2px 0}
.day{border:2px solid #ffe2ef;background:white;border-radius:17px;min-height:96px;padding:5px;text-align:center;cursor:pointer;display:grid;grid-template-rows:20px 1fr;align-items:center;overflow:hidden}
.day.empty{background:transparent;border:0;cursor:default}
.day.today{background:var(--pale);border-color:var(--hot);box-shadow:inset 0 0 0 2px white}
.dayNum{font-size:12px;font-weight:950}
.calCat{width:100%;height:78px;object-fit:contain;transform:scale(1.45)}
.rows{display:grid;gap:10px;margin-top:10px}
.row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:10px;background:white;border:2px solid #ffe0ef;border-radius:18px}

.subject-row{
  grid-template-columns:1fr 84px 120px;
  align-items:center;
}
.subject-row .btn{
  width:auto;
  min-width:76px;
  padding:10px 12px;
}
.record-row{
  grid-template-columns:1fr 96px;
  align-items:center;
}
.record-row .btn{
  width:auto;
  min-width:82px;
}
.row.hidden{opacity:.48}
.rtitle{font-weight:950}
.rnote{color:var(--soft);font-size:13px;white-space:pre-line;font-weight:700}
.two{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:end}
.section{margin-top:16px;padding-top:15px;border-top:3px dashed var(--line)}
nav{position:fixed;left:50%;bottom:7px;transform:translateX(-50%);width:calc(100% - 22px);max-width:920px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:6px;border-radius:28px;border:3px solid #ffd7e9;background:#ffffffe8;box-shadow:0 14px 34px #ff8fc733;z-index:20}
nav button{border:0;border-radius:20px;background:transparent;color:var(--soft);font-weight:950;font-size:15px;padding:10px 4px;cursor:pointer}
nav button.active{background:var(--pink);color:white}
.back{position:fixed;inset:0;background:#5a405f66;z-index:50;display:none;place-items:center;padding:18px}
.back.show{display:grid}
.modal{width:min(540px,100%);background:white;border:5px solid #ffd5e8;border-radius:34px;box-shadow:0 24px 70px #5a405f47;padding:22px 18px;text-align:center}
.modal img{width:220px;height:220px;object-fit:contain;display:block;margin:0 auto 8px}
.modal h2{font-size:28px}
.mtext{white-space:pre-line;font-size:19px;line-height:1.55;font-weight:900;margin-bottom:16px}
.close{width:100%;border:0;border-radius:22px;padding:15px;background:linear-gradient(var(--pink),var(--hot));color:white;font-weight:950;font-size:20px;box-shadow:0 8px 0 #dc4a96}
@media(max-width:620px){.hero{grid-template-columns:120px 1fr}.heroCat{width:112px;height:112px}.stats{grid-template-columns:repeat(2,1fr)}.day{min-height:74px;border-radius:12px}.calCat{width:100%;height:78px;object-fit:contain;transform:scale(1.45)}.row{grid-template-columns:1fr}.btn{width:100%}nav button{font-size:13px}h1{font-size:clamp(24px,5vw,34px)}}

/* v26 layout test: iPad landscape main screen */
.main-grid{display:grid;grid-template-columns:0.82fr 1.18fr;gap:12px;align-items:start}

const KEY="mainichiDrillStamp.local.v1";
const DEFAULT={subjects:[{id:"calc",name:"計算",hidden:false},{id:"bun",name:"文章",hidden:false},{id:"kanji",name:"漢字",hidden:false},{id:"expr",name:"ことばと表現",hidden:false}],records:{},milestones:[5,10,20,30,50,100]};
let data=load(),calDate=new Date();
function img(name){return CAT_DATA[name]||CAT_DATA["neko_04_nikori.png"]}
function load(){try{const p=JSON.parse(localStorage.getItem(KEY)||"{}");return {subjects:p.subjects||structuredClone(DEFAULT.subjects),records:p.records||{},milestones:p.milestones||structuredClone(DEFAULT.milestones)}}catch{return structuredClone(DEFAULT)}}
function save(){localStorage.setItem(KEY,JSON.stringify(data))}
function iso(d){const x=new Date(d.getTime()-d.getTimezoneOffset()*60000);return x.toISOString().slice(0,10)}
function today(){return iso(new Date())}
function esc(s){return String(s||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
function jp(s){const [y,m,d]=s.split("-");return `${+y}年${+m}月${+d}日`}
function visSub(){return data.subjects.filter(s=>!s.hidden)}
function subName(id){return (data.subjects.find(s=>s.id===id)||{}).name||"不明"}
function total(){return Object.keys(data.records).length}
function randomCat(){return STAMP_CATS[Math.floor(Math.random()*STAMP_CATS.length)]}
function currentStreak(){
  const dates=Object.keys(data.records).sort();
  if(!dates.length)return 0;
  const set=new Set(dates);
  let d=new Date(dates[dates.length-1]+"T00:00:00");
  let c=0;
  while(set.has(iso(d))){
    c++;
    d.setDate(d.getDate()-1);
  }
  return c;
}
function bestStreak(){const dates=Object.keys(data.records).sort(),set=new Set(dates);let best=0;for(const start of dates){let p=new Date(start+"T00:00:00");p.setDate(p.getDate()-1);if(set.has(iso(p)))continue;let c=0,d=new Date(start+"T00:00:00");while(set.has(iso(d))){c++;d.setDate(d.getDate()+1)}best=Math.max(best,c)}return best}
function nextReward(t){const arr=[...data.milestones].sort((a,b)=>a-b);const n=arr.find(x=>x>t)||Math.ceil((t+1)/50)*50;return {next:n,remain:n-t}}

function buildLogPayload(){
  return {
    app:"mainichiDrillStamp",
    version:"v16",
    exportedAt:new Date().toISOString(),
    note:"このログを編集して読み込むと、記録画面・スタンプ帳画面・設定画面の表示に反映されます。",
    data:{
      subjects:data.subjects,
      milestones:data.milestones,
      "_comment_records_start":"ここから学習履歴です。日付ごとの記録を修正・削除・追加できます。",
      records:data.records
    }
  };
}
function exportLog(){
  const payload=buildLogPayload();
  const text=JSON.stringify(payload,null,2);
  const area=document.getElementById("exportLogText");
  if(area){
    area.value=text;
    area.focus();
    area.select();
  }
  show("ログを書き出しました","設定画面のログ欄にJSONを表示しました。\nコピーしてメモなどに保存できます。","neko_04_nikori.png");
}
async function copyLog(){
  const area=document.getElementById("exportLogText");
  if(!area || !area.value.trim()){
    exportLog();
  }
  const text=document.getElementById("exportLogText").value;
  try{
    await navigator.clipboard.writeText(text);
    show("コピーしました","ログJSONをクリップボードにコピーしました。","neko_07_ureshii.png");
  }catch(e){
    const area=document.getElementById("exportLogText");
    if(area){area.focus();area.select();}
    show("コピー準備をしました","自動コピーできない環境です。\nログ欄を長押ししてコピーしてください。","neko_09_hatena.png");
  }
}

function importLogFromText(){
  const area=document.getElementById("exportLogText");
  const text=area ? area.value.trim() : "";
  if(!text){
    show("ログが空です","ログJSONを書き出すか、保存済みログを貼り付けてください。","neko_09_hatena.png");
    return;
  }

  let parsed, imported;
  try{
    parsed=JSON.parse(text);
    imported=parsed.data ? parsed.data : parsed;
    if(!imported || typeof imported!=="object"){
      throw new Error("invalid");
    }
    if(!imported.records || typeof imported.records!=="object"){
      throw new Error("records");
    }
    if(!imported.subjects || !Array.isArray(imported.subjects)){
      throw new Error("subjects");
    }
  }catch(e){
    show("読み込めません","JSONの形式を確認してください。\nログ全文が途中で切れていないかも確認してください。","neko_09_hatena.png");
    return;
  }

  data={
    subjects:imported.subjects,
    records:imported.records,
    milestones:imported.milestones || structuredClone(DEFAULT.milestones)
  };
  save();
  render();
  setTimeout(()=>{
    show("ログを読み込みました","貼り付けたログJSONを反映しました。\nメイン画面・設定画面にも反映されています。","neko_07_ureshii.png");
  },50);
}

function renderCalendarInto(gridId, monthId){
  const grid=document.getElementById(gridId);

  const monthEl=document.getElementById(monthId);

  ["月","火","水","木","金","土","日"].forEach(x=>{const e=document.createElement("div");e.className="dow";e.textContent=x;grid.appendChild(e)});
  const first=new Date(y,m,1),last=new Date(y,m+1,0),pad=(first.getDay()+6)%7;
  for(let i=0;i<pad;i++){const e=document.createElement("div");e.className="day empty";grid.appendChild(e)}
  for(let d=1;d<=last.getDate();d++){
    const dt=new Date(y,m,d),id=iso(dt),rec=data.records[id],e=document.createElement("button");
    e.className="day"+(id===today()?" today":"");
    e.dataset.date=id;

    e.onpointerup=(ev)=>{ev.preventDefault();dayDetail(id);};
    grid.appendChild(e);
  }
}

function dayDetail(id){
  const rec=data.records[id];
  const overlay=document.getElementById("back");
  const box=document.querySelector("#back .modal");
  const msg=document.getElementById("mtext");
  const title=document.getElementById("mtitle");
  const cat=document.getElementById("modalCat");
  const close=document.getElementById("close");
  if(!overlay||!box||!msg||!title||!cat||!close)return;

  box.querySelectorAll(".delete-day-btn").forEach(b=>b.remove());

  if(!rec){
    cat.src=img("neko_09_hatena.png");
    title.textContent="まだ記録がないにゃ";
    msg.textContent=id.replaceAll("-","/")+" はまだスタンプがないにゃ。";
    close.textContent="とじる";
    overlay.classList.add("show");
    return;
  }

  const lines=(rec.entries||[]).map(e=>{
    const s=data.subjects.find(x=>x.id===e.subjectId);
    return `${s?s.name:e.subjectId}${e.memo?"："+e.memo:""}`;
  }).join("\n");

  cat.src=img(rec.stamp);
  title.textContent=id.replaceAll("-","/");
  msg.textContent=lines||"記録があります。";
  close.textContent="とじる";

  const del=document.createElement("button");
  del.type="button";
  del.className="delete-day-btn delete-day-open";
  del.textContent="この日の記録を削除";
  del.addEventListener("click",()=>showConfirmDeleteDay(id));
  close.parentNode.insertBefore(del,close);

  overlay.classList.add("show");
}

function showConfirmDeleteDay(id){
  const overlay=document.getElementById("back");
  const box=document.querySelector("#back .modal");
  const msg=document.getElementById("mtext");
  const title=document.getElementById("mtitle");
  const cat=document.getElementById("modalCat");
  const close=document.getElementById("close");
  if(!overlay||!box||!msg||!title||!cat||!close)return;

  box.querySelectorAll(".delete-day-btn").forEach(b=>b.remove());
  cat.src=img("neko_09_hatena.png");
  title.textContent="削除しますか？";
  msg.textContent=id.replaceAll("-","/")+" の記録を削除します。\nこの操作は元に戻せません。";
  close.textContent="やめる";

  const yes=document.createElement("button");
  yes.type="button";
  yes.className="delete-day-btn delete-day-confirm";
  yes.textContent="削除する";
  yes.addEventListener("click",()=>{
    delete data.records[id];
    save();
    overlay.classList.remove("show");
    render();
  });
  close.parentNode.insertBefore(yes,close);
  overlay.classList.add("show");
}

function v32CleanupAdmin(){
  const admin=document.getElementById("admin");
  if(!admin)return;
  const heads=[...admin.querySelectorAll("h2,h3")];
  heads.forEach(h=>{
    if((h.textContent||"").includes("学習履歴")){
      let n=h, rm=[];
      while(n){
        const next=n.nextElementSibling;
        rm.push(n);
        if(next && (next.textContent||"").includes("ログ管理"))break;
        n=next;
      }
      rm.forEach(x=>x.remove());
    }
  });
  // remove consecutive dotted separators immediately before log management
  const logHead=[...admin.querySelectorAll("h2,h3")].find(h=>(h.textContent||"").includes("ログ管理"));
  if(logHead){
    let p=logHead.previousElementSibling;
    while(p && ((p.textContent||"").trim()==="" || p.className.includes("divider") || p.tagName==="HR")){
      const prev=p.previousElementSibling;
      p.remove();
      p=prev;
    }
  }
}

function v32BindCalendarDays(){
  v33InstallCalendarDelegation();
  document.querySelectorAll(".day,.cal-day,.calendar-day,[data-date]").forEach(el=>{
    const id=v33CalendarDateFromEventTarget(el);
    if(!id)return;
    el.dataset.date=id;
    el.style.cursor="pointer";
    el.onclick=function(ev){ev.preventDefault();ev.stopPropagation();dayDetail(id);return false;};
  });
}


function v33CalendarDateFromEventTarget(target){
  const cell = target.closest(".day,.cal-day,.calendar-day,[data-date],td,button");
  if(!cell)return null;
  if(cell.dataset && cell.dataset.date)return cell.dataset.date;
  const t=(cell.querySelector(".daynum,.day-number,.date-num")||cell).textContent || "";
  const d=parseInt(t.trim(),10);
  if(!d || d<1 || d>31)return null;
  let y=(typeof calY!=="undefined"?calY:new Date().getFullYear());
  let m=(typeof calM!=="undefined"?calM:new Date().getMonth());
  const title=document.querySelector("#monthTitle") || document.querySelector(".monthTitle") || document.querySelector(".calendar-title");
  if(title){
    const mm=(title.textContent||"").match(/(\d{4})年\s*(\d{1,2})月/);
    if(mm){y=+mm[1];m=+mm[2]-1;}
  }else{
    const body=document.body.textContent||"";
    const mm=body.match(/(\d{4})年\s*(\d{1,2})月/);
    if(mm){y=+mm[1];m=+mm[2]-1;}
  }
  return `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
}

function v33InstallCalendarDelegation(){
  document.querySelectorAll(".calendar,.calendar-card,.calendar-card-main,#calGrid,#calGridMain,.calendar-grid").forEach(root=>{
    if(root.dataset.v33bound==="1")return;
    root.dataset.v33bound="1";
    root.addEventListener("click",function(ev){
      const id=v33CalendarDateFromEventTarget(ev.target);
      if(!id)return;
      ev.preventDefault();
      ev.stopPropagation();
      dayDetail(id);
    },true);
  });
}

function v33CleanupAdminLines(){
  const admin=document.getElementById("admin");
  if(!admin)return;
  // remove learning history heading and its blank/line remains
  [...admin.querySelectorAll("h2,h3")].forEach(h=>{
    if((h.textContent||"").includes("学習履歴")){
      let n=h, rm=[];
      while(n){
        const next=n.nextElementSibling;
        rm.push(n);
        if(next && (next.textContent||"").includes("ログ管理"))break;
        n=next;
      }
      rm.forEach(x=>x.remove());
    }
  });
  [...admin.children].forEach(el=>{
    const txt=(el.textContent||"").trim();
    const cls=String(el.className||"");
    if(txt==="" && (cls.includes("divider") || el.tagName==="HR" || el.offsetHeight<20)){
      el.remove();
    }
  });
}
setInterval(()=>{v33InstallCalendarDelegation();v33CleanupAdminLines();},500);
